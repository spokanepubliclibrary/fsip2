apiVersion: v1
kind: Secret
metadata:
  name: fsip2-secret
  namespace: fsip2
  labels:
    app.kubernetes.io/name: fsip2
    app.kubernetes.io/component: sip2-server
type: Opaque
data:
  # Optional: TLS certificate (base64 encoded)
  # tls.crt: <base64-encoded-certificate>

  # Optional: TLS private key (base64 encoded)
  # tls.key: <base64-encoded-private-key>

  # Optional: AWS credentials for S3 config source (base64 encoded)
  # aws-access-key-id: <base64-encoded-access-key>
  # aws-secret-access-key: <base64-encoded-secret-key>

  # Optional: HTTP basic auth for config source (base64 encoded)
  # http-username: <base64-encoded-username>
  # http-password: <base64-encoded-password>

