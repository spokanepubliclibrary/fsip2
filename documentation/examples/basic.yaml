# Basic fsip2 configuration example
# This is the main bootstrap configuration file

# SIP2 server port
port: 6443

# FOLIO Okapi URL (overridden per tenant)
okapiUrl: https://okapi.example.com

# HTTP health check port
healthCheckPort: 8081

# Maximum number of cached authentication tokens
tokenCacheCapacity: 100

# How often (in milliseconds) to poll for tenant config changes. Default: 300000 (5 minutes).
# Set to 0 to use the default. Minimum effective value: 1000ms.
scanPeriod: 300000

# Application log level (debug, info, warn, error)
logLevel: info

# Tenant configuration sources
# Configurations will be loaded from these sources in order.
# Each source file must use the "tenants:" list format — a single source file
# can define multiple tenants. The flat single-tenant format is not supported.
# See documentation/examples/tenant-config.yaml for the required file structure.
tenantConfigSources:
  - type: file
    path: ./documentation/examples/tenant-config.yaml

# Optional: TLS/SSL configuration
# tls:
#   enabled: true
#   certFile: /etc/ssl/certs/server.crt
#   keyFile: /etc/ssl/private/server.key
